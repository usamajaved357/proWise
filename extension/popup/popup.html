<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snag AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:300px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1120;color:#f0eeea;overflow:hidden;border:0.5px solid #6366f1}
.popup-wrap{background:#0d1120;border-radius:0;overflow:hidden}

/* Header */
.hdr{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06)}
.hdr-brand{display:flex;align-items:center;gap:9px}
.hdr-logo{width:32px;height:32px;border-radius:9px;background:#6366f1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-name{font-size:13px;font-weight:700;color:#f0eeea;letter-spacing:-.01em}
.hdr-sub{font-size:10px;color:rgba(240,238,234,.4);margin-top:1px}
.settings-btn{display:none}

/* Usage card */
.usage-card{margin:12px 14px 0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:13px 14px}
.usage-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.plan-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 12px;border-radius:999px;letter-spacing:.04em}
.badge-free{background:rgba(248,113,113,.12);color:#fca5a5;border:1px solid rgba(248,113,113,.25)}
.badge-starter{background:rgba(96,165,250,.12);color:#93c5fd;border:1px solid rgba(96,165,250,.25)}
.badge-pro{background:rgba(99,102,241,.15);color:#a5b4fc;border:1px solid rgba(99,102,241,.3)}
.badge-agency{background:rgba(52,211,153,.12);color:#6ee7b7;border:1px solid rgba(52,211,153,.25)}
.usage-count{font-size:11px;color:rgba(240,238,234,.45)}
.usage-count strong{color:#f0eeea;font-weight:600}

/* Progress bar */
.bar-wrap{height:4px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;margin-bottom:7px}
.bar-fill{height:100%;border-radius:999px;transition:width .4s ease,background .3s}
.bar-ok{background:#6366f1}
.bar-warn{background:#f59e0b}
.bar-danger{background:#f87171}

.usage-status{font-size:11px;color:rgba(240,238,234,.4)}
.usage-status.warn{color:#fbbf24}
.usage-status.danger{color:#fca5a5;font-weight:500}

/* Alert banner */
.alert-banner{margin:10px 14px 0;padding:9px 12px;border-radius:10px;font-size:11.5px;line-height:1.55;display:none}
.alert-warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:#fbbf24}
.alert-danger{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:#fca5a5}

/* Email row */
.email-row{margin:10px 14px 0;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;display:flex;align-items:center;gap:8px}
.email-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);flex-shrink:0}
.email-dot.on{background:#34d399}
.email-info{flex:1;min-width:0}
.email-label{font-size:10px;color:rgba(240,238,234,.35);margin-bottom:1px}
.email-val{font-size:11.5px;font-weight:500;color:#f0eeea;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.email-edit{font-size:11px;color:#818cf8;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.email-edit:hover{color:#a5b4fc}

/* Email input */
.email-input-wrap{margin:10px 14px 0;display:none}
.email-input-wrap.show{display:flex;gap:6px}
.email-inp{flex:1;padding:8px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:999px;color:#f0eeea;font-size:12px;font-family:inherit;outline:none}
.email-inp:focus{border-color:#6366f1}
.email-inp::placeholder{color:rgba(240,238,234,.25)}
.email-save-btn{padding:8px 16px;background:#6366f1;color:#fff;border:none;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}

/* Upgrade button — capsule red outline */
.upgrade-btn{display:none;margin:10px 14px 0;width:calc(100% - 28px);padding:11px 20px;background:rgba(248,113,113,.1);color:#fca5a5;border:1.5px solid rgba(248,113,113,.28);border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.01em;text-align:center;transition:all .15s}
.upgrade-btn:hover{background:rgba(248,113,113,.18);border-color:rgba(248,113,113,.5)}

/* Open settings — capsule indigo */
.open-settings{display:flex;align-items:center;justify-content:center;gap:7px;margin:10px 14px 0;width:calc(100% - 28px);padding:11px 20px;background:#6366f1;color:#fff;border:none;border-radius:999px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:all .15s;letter-spacing:.01em}
.open-settings:hover{opacity:.88;transform:translateY(-1px)}
.open-settings svg{opacity:.9;flex-shrink:0}

/* Footer */
.ftr{padding:10px 14px 12px;text-align:center;font-size:10px;color:rgba(240,238,234,.16);margin-top:10px}
</style>
</head>
<body>

<div class="popup-wrap">
<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">
      <svg width="20" height="20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="5" width="64" height="78" rx="10" stroke="white" stroke-width="5.5" fill="none"/>
        <line x1="14" y1="23" x2="57" y2="23" stroke="white" stroke-width="5" stroke-linecap="round"/>
        <line x1="14" y1="35" x2="57" y2="35" stroke="white" stroke-width="5" stroke-linecap="round"/>
        <line x1="14" y1="47" x2="57" y2="47" stroke="white" stroke-width="5" stroke-linecap="round"/>
        <line x1="14" y1="59" x2="40" y2="59" stroke="white" stroke-width="5" stroke-linecap="round"/>
        <circle cx="76" cy="77" r="23" fill="#4338ca"/>
        <polygon points="80,59 70,78 77,78 73,95 88,74 81,74" fill="white"/>
      </svg>
    </div>
    <div>
      <div class="hdr-name">Snag AI</div>
      <div class="hdr-sub">Upwork proposal writer</div>
    </div>
  </div>
  <!-- settings-btn kept for JS listener, visually hidden -->
  <button class="settings-btn" id="settings-btn" title="Open settings"></button>
</div>

<!-- Usage Card -->
<div class="usage-card">
  <div class="usage-top">
    <div class="plan-badge badge-free" id="plan-badge">Free</div>
    <div class="usage-count"><strong id="used-count">0</strong> / <span id="limit-count">2</span> used</div>
  </div>
  <div class="bar-wrap"><div class="bar-fill bar-ok" id="usage-bar" style="width:0%"></div></div>
  <div class="usage-status" id="usage-status">2 proposals remaining this month</div>
</div>

<!-- Alert banner -->
<div class="alert-banner" id="alert-banner"></div>

<!-- Email row -->
<div class="email-row" id="email-row">
  <div class="email-dot" id="email-dot"></div>
  <div class="email-info">
    <div class="email-label" id="email-label-top">Your email</div>
    <div class="email-val" id="email-val">Not set — required for subscription</div>
  </div>
  <span class="email-edit" id="email-toggle">Add</span>
</div>

<!-- Email input -->
<div class="email-input-wrap" id="email-input-wrap">
  <input type="email" class="email-inp" id="email-inp" placeholder="your@email.com">
  <button class="email-save-btn" id="email-save">Save</button>
</div>

<!-- Upgrade button -->
<button class="upgrade-btn" id="upgrade-btn">⚡ Upgrade Plan</button>

<!-- Dashboard & settings -->
<button class="open-settings" id="open-settings">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
  Dashboard &amp; settings
</button>

<div class="ftr">Snag AI v14.0 · Snag the job before anyone else</div>
</div><!-- end popup-wrap -->

<script src="popup.js"></script>
</body>
</html>
