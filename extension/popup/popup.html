<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snag AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:320px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1120;color:#f0eeea;overflow:hidden}

/* Header */
.hdr{padding:16px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07)}
.hdr-brand{display:flex;align-items:center;gap:9px}
.hdr-logo{width:28px;height:28px;border-radius:7px;background:#6366f1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-logo svg{width:16px;height:16px}
.hdr-name{font-size:14px;font-weight:700;color:#f0eeea;letter-spacing:-.01em}
.hdr-sub{font-size:10px;color:rgba(240,238,234,.4);margin-top:1px}
.settings-btn{width:30px;height:30px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:rgba(240,238,234,.5)}
.settings-btn:hover{background:rgba(255,255,255,.08);color:#f0eeea;border-color:rgba(255,255,255,.2)}

/* Usage card */
.usage-card{margin:14px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px}
.usage-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.plan-badge{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.03em}
.badge-free{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.badge-starter{background:rgba(96,165,250,.15);color:#60a5fa;border:1px solid rgba(96,165,250,.25)}
.badge-pro{background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}
.badge-agency{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.25)}
.usage-count{font-size:12px;color:rgba(240,238,234,.5)}
.usage-count strong{color:#f0eeea;font-weight:600}

/* Progress bar */
.bar-wrap{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:6px}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease,background .3s}
.bar-ok{background:linear-gradient(90deg,#c9a84c,#e8c878)}
.bar-warn{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.bar-danger{background:linear-gradient(90deg,#ef4444,#f87171)}

.usage-status{font-size:11px;color:rgba(240,238,234,.4)}
.usage-status.warn{color:#fbbf24}
.usage-status.danger{color:#f87171;font-weight:600}

/* Alert banner */
.alert-banner{margin:0 16px 12px;padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.5;display:none}
.alert-warn{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);color:#fbbf24}
.alert-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171}

/* Email row */
.email-row{margin:0 16px 12px;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;display:flex;align-items:center;gap:8px}
.email-dot{width:7px;height:7px;border-radius:50%;background:#374151;flex-shrink:0}
.email-dot.on{background:#34d399}
.email-info{flex:1;min-width:0}
.email-label{font-size:11px;color:rgba(240,238,234,.4);margin-bottom:1px}
.email-val{font-size:12px;font-weight:500;color:#f0eeea;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.email-edit{font-size:11px;color:#c9a84c;cursor:pointer;white-space:nowrap;flex-shrink:0}
.email-edit:hover{color:#e8c878}

/* Email input inline */
.email-input-wrap{margin:0 16px 12px;display:none}
.email-input-wrap.show{display:flex;gap:6px}
.email-inp{flex:1;padding:8px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#f0eeea;font-size:13px;font-family:inherit;outline:none}
.email-inp:focus{border-color:#c9a84c}
.email-inp::placeholder{color:rgba(240,238,234,.25)}
.email-save-btn{padding:8px 14px;background:#c9a84c;color:#0d1120;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}

/* Upgrade button */
.upgrade-btn{display:none;margin:0 16px 12px;width:calc(100% - 32px);padding:11px;background:linear-gradient(135deg,#c9a84c,#e8c878);color:#0d1120;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.01em;transition:opacity .15s}
.upgrade-btn:hover{opacity:.9}

/* Open settings */
.open-settings{display:flex;align-items:center;justify-content:center;gap:7px;margin:0 16px;padding:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:rgba(240,238,234,.7);transition:all .15s;width:calc(100% - 32px)}
.open-settings:hover{background:rgba(255,255,255,.09);color:#f0eeea;border-color:rgba(255,255,255,.15)}
.open-settings svg{opacity:.6}

/* Footer */
.ftr{padding:10px 16px;text-align:center;font-size:10px;color:rgba(240,238,234,.2);border-top:1px solid rgba(255,255,255,.05);margin-top:12px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">
      <svg width="22" height="22" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="5" width="64" height="78" rx="10" stroke="white" stroke-width="5.5" fill="none"/>
        <line x1="14" y1="23" x2="57" y2="23" stroke="white" stroke-width="5" stroke-linecap="round"/>
        <line x1="14" y1="35" x2="57" y2="35" stroke="white" stroke-width="5" stroke-linecap="round"/>
        <line x1="14" y1="47" x2="57" y2="47" stroke="white" stroke-width="5" stroke-linecap="round"/>
        <line x1="14" y1="59" x2="40" y2="59" stroke="white" stroke-width="5" stroke-linecap="round"/>
        <circle cx="76" cy="77" r="23" fill="#4338ca"/>
        <polygon points="80,59 70,78 77,78 73,95 88,74 81,74" fill="white"/>
      </svg>
    </div>
    <div>
      <div class="hdr-name">Snag AI</div>
      <div class="hdr-sub">Upwork proposal writer</div>
    </div>
  </div>
  <button class="settings-btn" id="settings-btn" title="Open settings">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</div>

<!-- Usage Card -->
<div class="usage-card">
  <div class="usage-top">
    <div class="plan-badge badge-free" id="plan-badge">Free</div>
    <div class="usage-count"><strong id="used-count">0</strong> / <span id="limit-count">2</span> used</div>
  </div>
  <div class="bar-wrap"><div class="bar-fill bar-ok" id="usage-bar" style="width:0%"></div></div>
  <div class="usage-status" id="usage-status">2 proposals remaining this month</div>
</div>

<!-- Alert banner -->
<div class="alert-banner" id="alert-banner"></div>

<!-- Email row -->
<div class="email-row" id="email-row">
  <div class="email-dot" id="email-dot"></div>
  <div class="email-info">
    <div class="email-label" id="email-label-top">Your email</div>
    <div class="email-val" id="email-val">Not set — required for subscription</div>
  </div>
  <span class="email-edit" id="email-toggle">Add</span>
</div>

<!-- Email input -->
<div class="email-input-wrap" id="email-input-wrap">
  <input type="email" class="email-inp" id="email-inp" placeholder="your@email.com">
  <button class="email-save-btn" id="email-save">Save</button>
</div>

<!-- Upgrade button -->
<button class="upgrade-btn" id="upgrade-btn">⚡ Upgrade Plan</button>

<!-- Open settings -->
<button class="open-settings" id="open-settings">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
  Profile, settings & more
</button>

<div class="ftr">Snag AI v6.0 · Snag the job before anyone else</div>

<script src="popup.js"></script>
</body>
</html>
